# ============================================================
# CelikSense AI — GitHub Pages Deployment
# ============================================================
# Triggered automatically every time you push to `main`.
# Copies the `starter-code/` folder to GitHub Pages so your
# website lives at:
#   https://sitizaharah2026.github.io/CelikSense_AI/
# ============================================================

name: Deploy to GitHub Pages

on:
  # Run on every push to main
  push:
    branches:
      - main
  # Also allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; don't cancel in-progress deploys
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # Tells GitHub this job deploys to the "github-pages" environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Tell GitHub Pages we are deploying a static site
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # 3. Package the starter-code/ folder as the site artifact
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only publish what's inside starter-code/ — keeps source code private
          path: "./starter-code"

      # 4. Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
