<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Page Not Found — CelikSense AI</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #c4b8ff 0%, #ddd6ff 40%, #7dd3ea 100%);
      font-family: system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; color: #1e1b4b; margin-bottom: 12px; }
    p  { color: #4c4597; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      margin: 6px;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #4f46e5;
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">🧠</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or has moved.<br>
       Let us take you back to CelikSense AI.</p>
    <div>
      <a href="index.html"     class="btn">Go to Home</a>
      <a href="dashboard.html" class="btn btn-outline">Open Dashboard</a>
    </div>
  </div>
</body>
</html>
